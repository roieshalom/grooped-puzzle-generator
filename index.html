<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Puzzle Editor 3000</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/static/editor.css">
</head>
<body>

  <div class="container">
    <div class="top-bar">
      <div class="title-block">
        <h1 class="title" id="titleText">Puzzle Editor 3000</h1>
        <span id="puzzleDateLabel" class="puzzle-date-label"></span>
      </div>
      <div class="actions">
        <button class="action-btn save" id="saveBtn">Save</button>
        <button class="action-btn reload" id="reloadBtn">Revert</button>
        <button class="action-btn generate" id="generateBtn">Generate</button>
        <button class="action-btn export" id="exportBtn">Export</button>
        <div id="authPanel" class="auth-panel">
          <input type="password" id="inlinePasswordInput" placeholder="password" autocomplete="current-password" />
          <button id="inlineUnlockBtn" class="unlock-btn">Unlock</button>
        </div>
        <button class="lock-btn" id="lockBtn" title="Unlock editor">🔒</button>
      </div>
    </div>

    <!-- Validation + message -->
    <div id="validationErrors" class="validation-errors" style="display: none;"></div>

    <div id="messageArea" class="message-area">
      <div id="messageBox" class="message-box" style="display:none;">Ready</div>
    </div>

    <!-- Puzzle wrapper so we can overlay the whole thing -->
    <div id="puzzleContainer" class="puzzle-container">
      <div class="puzzle-content">
        <!-- Category 0 -->
        <div class="category" data-color="purple" data-category-index="0">
          <div class="category-overlay">
            <div class="category-overlay-inner">
              <i class="fas fa-spinner fa-spin"></i>
              <span class="overlay-label">Thinking…</span>
            </div>
          </div>
          <div class="color-square-wrapper">
            <div class="color-square purple" data-current-color="purple"></div>
            <span class="color-arrow">▼</span>
            <div class="color-dropdown">
              <div class="color-option purple" data-color="purple" style="background: #9b59b6;"></div>
              <div class="color-option green"  data-color="green"  style="background: #27ae60;"></div>
              <div class="color-option blue"   data-color="blue"   style="background: #3498db;"></div>
              <div class="color-option orange" data-color="orange" style="background: #e67e22;"></div>
            </div>
          </div>
          <div class="category-content">
            <div class="category-header">
              <input type="text" class="category-name-input" data-category="0" placeholder="category name" />
              <button class="regenerate-btn" data-category="0" title="Regenerate this category"><i class="fas fa-sync-alt"></i></button>
              <button class="ban-btn" data-category="0" title="Skip this category and never show it again"><i class="fas fa-ban"></i></button>
            </div>
            <div class="words-row">
              <input type="text" class="word-input" data-category="0" data-word="0" placeholder="word" />
              <input type="text" class="word-input" data-category="0" data-word="1" placeholder="word" />
              <input type="text" class="word-input" data-category="0" data-word="2" placeholder="word" />
              <input type="text" class="word-input" data-category="0" data-word="3" placeholder="word" />
            </div>
          </div>
        </div>

        <!-- Category 1 -->
        <div class="category" data-color="green" data-category-index="1">
          <div class="category-overlay">
            <div class="category-overlay-inner">
              <i class="fas fa-spinner fa-spin"></i>
              <span class="overlay-label">Thinking…</span>
            </div>
          </div>
          <div class="color-square-wrapper">
            <div class="color-square green" data-current-color="green"></div>
            <span class="color-arrow">▼</span>
            <div class="color-dropdown">
              <div class="color-option purple" data-color="purple" style="background: #9b59b6;"></div>
              <div class="color-option green"  data-color="green"  style="background: #27ae60;"></div>
              <div class="color-option blue"   data-color="blue"   style="background: #3498db;"></div>
              <div class="color-option orange" data-color="orange" style="background: #e67e22;"></div>
            </div>
          </div>
          <div class="category-content">
            <div class="category-header">
              <input type="text" class="category-name-input" data-category="1" placeholder="category name" />
              <button class="regenerate-btn" data-category="1" title="Regenerate this category"><i class="fas fa-sync-alt"></i></button>
              <button class="ban-btn" data-category="1" title="Skip this category and never show it again"><i class="fas fa-ban"></i></button>
            </div>
            <div class="words-row">
              <input type="text" class="word-input" data-category="1" data-word="0" placeholder="word" />
              <input type="text" class="word-input" data-category="1" data-word="1" placeholder="word" />
              <input type="text" class="word-input" data-category="1" data-word="2" placeholder="word" />
              <input type="text" class="word-input" data-category="1" data-word="3" placeholder="word" />
            </div>
          </div>
        </div>

        <!-- Category 2 -->
        <div class="category" data-color="blue" data-category-index="2">
          <div class="category-overlay">
            <div class="category-overlay-inner">
              <i class="fas fa-spinner fa-spin"></i>
              <span class="overlay-label">Thinking…</span>
            </div>
          </div>
          <div class="color-square-wrapper">
            <div class="color-square blue" data-current-color="blue"></div>
            <span class="color-arrow">▼</span>
            <div class="color-dropdown">
              <div class="color-option purple" data-color="purple" style="background: #9b59b6;"></div>
              <div class="color-option green"  data-color="green"  style="background: #27ae60;"></div>
              <div class="color-option blue"   data-color="blue"   style="background: #3498db;"></div>
              <div class="color-option orange" data-color="orange" style="background: #e67e22;"></div>
            </div>
          </div>
          <div class="category-content">
            <div class="category-header">
              <input type="text" class="category-name-input" data-category="2" placeholder="category name" />
              <button class="regenerate-btn" data-category="2" title="Regenerate this category"><i class="fas fa-sync-alt"></i></button>
              <button class="ban-btn" data-category="2" title="Skip this category and never show it again"><i class="fas fa-ban"></i></button>
            </div>
            <div class="words-row">
              <input type="text" class="word-input" data-category="2" data-word="0" placeholder="word" />
              <input type="text" class="word-input" data-category="2" data-word="1" placeholder="word" />
              <input type="text" class="word-input" data-category="2" data-word="2" placeholder="word" />
              <input type="text" class="word-input" data-category="2" data-word="3" placeholder="word" />
            </div>
          </div>
        </div>

        <!-- Category 3 -->
        <div class="category" data-color="orange" data-category-index="3">
          <div class="category-overlay">
            <div class="category-overlay-inner">
              <i class="fas fa-spinner fa-spin"></i>
              <span class="overlay-label">Thinking…</span>
            </div>
          </div>
          <div class="color-square-wrapper">
            <div class="color-square orange" data-current-color="orange"></div>
            <span class="color-arrow">▼</span>
            <div class="color-dropdown">
              <div class="color-option purple" data-color="purple" style="background: #9b59b6;"></div>
              <div class="color-option green"  data-color="green"  style="background: #27ae60;"></div>
              <div class="color-option blue"   data-color="blue"   style="background: #3498db;"></div>
              <div class="color-option orange" data-color="orange" style="background: #e67e22;"></div>
            </div>
          </div>
          <div class="category-content">
            <div class="category-header">
              <input type="text" class="category-name-input" data-category="3" placeholder="category name" />
              <button class="regenerate-btn" data-category="3" title="Regenerate this category"><i class="fas fa-sync-alt"></i></button>
              <button class="ban-btn" data-category="3" title="Skip this category and never show it again"><i class="fas fa-ban"></i></button>
            </div>
            <div class="words-row">
              <input type="text" class="word-input" data-category="3" data-word="0" placeholder="word" />
              <input type="text" class="word-input" data-category="3" data-word="1" placeholder="word" />
              <input type="text" class="word-input" data-category="3" data-word="2" placeholder="word" />
              <input type="text" class="word-input" data-category="3" data-word="3" placeholder="word" />
            </div>
          </div>
        </div>

        <div class="design-notes" id="designNotes" style="display:none;"></div>
        <div class="status" id="status"></div>
        <div class="ban-status" id="banStatus" style="display:none;"></div>
      </div>

      <!-- full-puzzle overlay -->
      <div id="puzzleOverlay" class="puzzle-overlay">
        <div class="puzzle-overlay-inner">
          <i class="fas fa-spinner fa-spin"></i>
          <span class="overlay-label">Generating puzzle…</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/editor.js"></script>
</body>
</html>
