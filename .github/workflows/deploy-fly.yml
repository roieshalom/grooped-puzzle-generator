name: Deploy to Fly.io

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/deploy@master
        with:
          app: "grooped-editor"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

