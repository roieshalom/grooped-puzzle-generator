<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit puzzles_week.json</title>
  <link href="https://cdn.jsdelivr.net/npm/jsoneditor@9.8.0/dist/jsoneditor.min.css" rel="stylesheet" />
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin: 0; }
    header { padding: 10px 16px; background: #0b5cff; color: white; display:flex; align-items:center; gap:12px }
    #editor { height: calc(100vh - 64px); }
    .controls button { margin-right: 8px; }
    .status { margin-left: 12px; font-weight:600 }
  </style>
</head>
<body>
  <header>
    <div style="font-size:18px">🧩 <strong>puzzles_week.json</strong> editor</div>
    <div style="flex:1"></div>
    <div class="controls">
      <label style="margin-right:12px"><input type="checkbox" id="backup"> Create backup on save</label>
      <button id="reload">Reload</button>
      <button id="save">Save</button>
      <span class="status" id="status">(idle)</span> 
    </div>
  </header>

  <div id="editor"></div>

  <script src="https://cdn.jsdelivr.net/npm/jsoneditor@9.8.0/dist/jsoneditor.min.js"></script>
  <script>
    const statusEl = document.getElementById('status')
    function setStatus(s) { statusEl.textContent = s }

    const container = document.getElementById('editor')
    const options = { mode: 'tree', modes: ['tree','code','form','text','view'] }
    const editor = new JSONEditor(container, options)

    async function load() {
      setStatus('Loading...')
      try {
        const r = await fetch('/api/puzzle')
        const data = await r.json()
        editor.set(data)
        setStatus('Loaded')
      } catch (e) {
        setStatus('Load failed')
        alert('Load failed: ' + e)
      }
    }

    async function save() {
      setStatus('Saving...')
      try {
        const data = editor.get()
        const r = await fetch('/api/puzzle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        })
        const res = await r.json()
        if (!r.ok) throw new Error(res.error || JSON.stringify(res))
        setStatus('Saved (backup: ' + (res.backup||'?') + ')')
      } catch (e) {
        setStatus('Save failed')
        alert('Save failed: ' + e)
      }
    }

    document.getElementById('save').addEventListener('click', save)
    document.getElementById('reload').addEventListener('click', () => { if (confirm('Reload from disk? Unsaved changes will be lost.')) load() })

    // load on start
    load()
  </script>
</body>
</html>
