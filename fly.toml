app = "grooped-editor"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  FLASK_HOST = "0.0.0.0"
  FLASK_PORT = "8080"
  GROOPED_REPO_DIR = "/app/grooped"
  AUTO_GIT_COMMIT = "true"
  FLASK_DEBUG = "False"
  PYTHONUNBUFFERED = "1"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
